<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soundlog — Explorar</title>
  <link rel="stylesheet" href="/albumbyalbum/css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css" />
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <div class="navbar__inner">
        <a href="/albumbyalbum/" class="navbar__logo display">Sound<span>log</span></a>
        <nav class="navbar__nav">
          <a href="/albumbyalbum/" class="navbar__link"><i class="ti ti-home"></i> Feed</a>
          <a href="/albumbyalbum/pages/explorar.html" class="navbar__link active"><i class="ti ti-compass"></i> Explorar</a>
          <a href="/albumbyalbum/pages/foros.html" class="navbar__link"><i class="ti ti-message-circle"></i> Foros</a>
          <a href="/albumbyalbum/pages/stats.html" class="navbar__link"><i class="ti ti-chart-bar"></i> Stats</a>
        </nav>
        <div class="navbar__search">
          <i class="ti ti-search"></i>
          <input type="text" id="searchInput" placeholder="Buscar álbumes, artistas..." onkeyup="searchAlbums()">
        </div>
        <div class="navbar__right">
          <a href="/albumbyalbum/pages/perfil.html" class="avatar avatar--md avatar--purple user-avatar">JM</a>
          <button class="btn--ghost btn" onclick="logout()"><i class="ti ti-logout"></i></button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">
    <div style="margin-bottom: 24px;">
      <h1 class="display" style="font-size: 2rem;">Explorar</h1>
      <p class="text-muted">Descubre álbumes populares en la comunidad</p>
    </div>

    <!-- Filtros -->
    <div class="flex gap-8 mb-24 wrap">
      <button class="btn btn--secondary btn--sm active" onclick="filterExplore('all', this)">🎵 Todos</button>
      <button class="btn btn--secondary btn--sm" onclick="filterExplore('rock', this)">🎸 Rock</button>
      <button class="btn btn--secondary btn--sm" onclick="filterExplore('jazz', this)">🎷 Jazz</button>
      <button class="btn btn--secondary btn--sm" onclick="filterExplore('electronic', this)">🎹 Electrónica</button>
      <button class="btn btn--secondary btn--sm" onclick="filterExplore('pop', this)">🎤 Pop</button>
      <button class="btn btn--secondary btn--sm" onclick="filterExplore('metal', this)">🤘 Metal</button>
    </div>

    <!-- Resultados -->
    <div class="section-label">📀 ÁLBUMES POPULARES</div>
    <div id="explore-container" class="mb-24">
      <div class="empty-state"><i class="ti ti-compass"></i><p>Cargando...</p></div>
    </div>

    <!-- Recomendaciones personalizadas -->
    <div class="section-label mt-24">🎯 RECOMENDADO PARA TI</div>
    <div id="recommendations-container-explore" class="mb-24">
      <div class="empty-state"><i class="ti ti-star"></i><p>Agrega más álbumes para recibir recomendaciones</p></div>
    </div>
  </main>

  <!-- MODAL AGREGAR ÁLBUM -->
  <div id="addAlbumModal" class="modal">
    <div class="modal__content">
      <div class="modal__header">
        <h3>📀 Registrar álbum escuchado</h3>
        <span class="modal__close" onclick="closeModal('addAlbumModal')">&times;</span>
      </div>
      <div class="modal__body">
        <div class="form-group">
          <label>Álbum *</label>
          <input type="text" id="albumTitle" placeholder="Ej: In Rainbows">
        </div>
        <div class="form-group">
          <label>Artista *</label>
          <input type="text" id="albumArtist" placeholder="Ej: Radiohead">
        </div>
        <div class="form-group">
          <label>Año</label>
          <input type="number" id="albumYear" placeholder="2007">
        </div>
        <div class="form-group">
          <label>Género</label>
          <input type="text" id="albumGenre" placeholder="Rock alternativo">
        </div>
        <div class="form-group">
          <label>Calificación</label>
          <select id="albumRating">
            <option value="5">★★★★★ (5)</option>
            <option value="4">★★★★☆ (4)</option>
            <option value="3">★★★☆☆ (3)</option>
            <option value="2">★★☆☆☆ (2)</option>
            <option value="1">★☆☆☆☆ (1)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Fecha que lo escuchaste</label>
          <input type="date" id="listenDate">
        </div>
        <div class="form-group">
          <label>Reseña (opcional)</label>
          <textarea id="albumReview" rows="3" placeholder="¿Qué te pareció?"></textarea>
        </div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--secondary" onclick="closeModal('addAlbumModal')">Cancelar</button>
        <button class="btn btn--primary" onclick="submitAlbum()">Guardar</button>
      </div>
    </div>
  </div>

  <div class="toast"></div>
  <script src="/albumbyalbum/js/main.js"></script>

  <script>
    let currentExploreFilter = 'all';

    function filterExplore(category, btn) {
      currentExploreFilter = category;
      document.querySelectorAll('#explorar-filtros .btn, .flex.gap-8.mb-24 .btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadExplorePage();
    }

    function searchAlbums() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const allAlbums = JSON.parse(localStorage.getItem('soundlog_albums') || '{}');
      const albumMap = new Map();
      
      for (const userId in allAlbums) {
        allAlbums[userId].forEach(album => {
          const key = `${album.title}|${album.artist}`;
          if (!albumMap.has(key)) {
            albumMap.set(key, {
              title: album.title,
              artist: album.artist,
              genre: album.genre,
              count: 1,
              ratings: [album.rating]
            });
          } else {
            const existing = albumMap.get(key);
            existing.count++;
            existing.ratings.push(album.rating);
          }
        });
      }
      
      let albums = Array.from(albumMap.values());
      
      if (searchTerm) {
        albums = albums.filter(a => 
          a.title.toLowerCase().includes(searchTerm) || 
          a.artist.toLowerCase().includes(searchTerm)
        );
      }
      
      if (currentExploreFilter !== 'all') {
        albums = albums.filter(a => a.genre?.toLowerCase().includes(currentExploreFilter));
      }
      
      albums.sort((a, b) => b.count - a.count);
      
      renderExploreResults(albums.slice(0, 30));
    }

    function renderExploreResults(albums) {
      const container = document.getElementById('explore-container');
      if (!container) return;
      
      if (albums.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="ti ti-compass"></i><p>No se encontraron álbumes</p></div>';
        return;
      }
      
      let html = '<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:16px;">';
      albums.forEach(album => {
        const avgRating = album.ratings.reduce((a,b) => a+b, 0) / album.ratings.length;
        const stars = '★'.repeat(Math.round(avgRating)) + '☆'.repeat(5 - Math.round(avgRating));
        html += `
          <div class="card card--hover" style="text-align:center; padding:16px; cursor:pointer;" onclick="quickAddAlbum('${album.title.replace(/'/g, "\\'")}', '${album.artist.replace(/'/g, "\\'")}')">
            <div style="font-size:56px; margin-bottom:8px;">${getAlbumEmoji(album.title)}</div>
            <div class="font-weight-600" style="font-weight:600; font-size:0.9rem;">${album.title.length > 25 ? album.title.substring(0,22)+'...' : album.title}</div>
            <div class="text-sm text-muted">${album.artist}</div>
            <div class="stars mt-6" style="justify-content:center;">${stars}</div>
            <div class="text-xs text-muted mt-4">${album.count} usuario${album.count !== 1 ? 's' : ''}</div>
          </div>
        `;
      });
      html += '</div>';
      container.innerHTML = html;
    }

    function quickAddAlbum(title, artist) {
      document.getElementById('albumTitle').value = title;
      document.getElementById('albumArtist').value = artist;
      openAddAlbumModal();
    }

    // Sobrescribir loadExplorePage para usar búsqueda
    const originalLoadExplorePage = window.loadExplorePage;
    window.loadExplorePage = function() {
      searchAlbums();
    };
  </script>
</body>
</html>
