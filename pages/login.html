<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soundlog — Login</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #0d0d0f; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: sans-serif; }
    .card { background: #1a1a1e; padding: 40px; border-radius: 16px; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    input, button { width: 100%; margin: 8px 0; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #25252a; color: white; box-sizing: border-box; }
    button { background: #7c6af7; color: white; cursor: pointer; border: none; font-weight: bold; }
    button:hover { background: #6a5acd; }
    .switch { text-align: center; margin-top: 16px; color: #a89cf9; cursor: pointer; font-size: 0.9rem; }
    h2 { color: white; text-align: center; margin-bottom: 24px; }
    #msg { color: #ff6b6b; margin-top: 12px; text-align: center; font-size: 0.85rem; }
  </style>
</head>
<body>
<div class="card">
  <h2 id="title">Iniciar sesión</h2>
  <input type="text" id="username" placeholder="Usuario">
  <input type="password" id="password" placeholder="Contraseña">
  <button id="actionBtn">Iniciar sesión</button>
  <div class="switch" id="switchBtn">¿No tienes cuenta? Regístrate</div>
  <div id="msg"></div>
</div>

<script>
  // Asegúrate de que estas credenciales sean correctas (las de tu proyecto de Supabase)
  const SUPABASE_URL = 'https://omwdajgpywdwrbiguvfl.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_e4HpONc7gleaNaxEG6FTUQ_5t4JbdLa';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  
  let isLogin = true;
  
  const switchBtn = document.getElementById('switchBtn');
  const actionBtn = document.getElementById('actionBtn');
  const title = document.getElementById('title');
  const msg = document.getElementById('msg');

  switchBtn.onclick = () => {
    isLogin = !isLogin;
    title.textContent = isLogin ? 'Iniciar sesión' : 'Registrarse';
    actionBtn.textContent = isLogin ? 'Iniciar sesión' : 'Registrarse';
    switchBtn.textContent = isLogin ? '¿No tienes cuenta? Regístrate' : '¿Ya tienes cuenta? Inicia sesión';
    msg.textContent = '';
  };
  
  actionBtn.onclick = async () => {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    
    if (!username || !password) {
      msg.textContent = 'Por favor, rellena todos los campos';
      return;
    }
    
    msg.textContent = 'Procesando...';

    if (isLogin) {
      // LOGIN
      const { data, error } = await supabase.from('users').select('*').eq('username', username).eq('password', password).single();
      
      if (error || !data) {
        msg.textContent = 'Usuario o contraseña incorrectos.';
      } else {
        localStorage.setItem('soundlog_current_user', JSON.stringify(data));
        window.location.href = '../index.html';
      }
    } else {
      // REGISTRO
      // Primero verificar si existe
      const { data: existing } = await supabase.from('users').select('username').eq('username', username).single();
      
      if (existing) {
        msg.textContent = 'El usuario ya existe.';
        return;
      }

      const { error } = await supabase.from('users').insert([{ 
        username: username, 
        password: password,
        email: username + '@soundlog.com' // Fallback básico
      }]);
      
      if (error) {
        msg.textContent = 'Error al registrar: ' + error.message;
      } else {
        msg.style.color = '#1db954';
        msg.textContent = '¡Cuenta creada! Ahora inicia sesión.';
        switchBtn.click(); // Cambiar a login automáticamente
      }
    }
  };
</script>
</body>
</html>
