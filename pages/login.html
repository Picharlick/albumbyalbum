<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Soundlog — Iniciar sesión</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d0d0f 0%, #0a0a0c 100%);
      padding: 20px;
    }
    .auth-card {
      background: #1a1a1e;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    .auth-card h1 { text-align: center; margin-bottom: 32px; font-size: 1.5rem; color: white; }
    .navbar__logo {
      font-family: 'Instrument Serif', serif;
      font-size: 2rem;
      text-align: center;
      margin-bottom: 24px;
      display: block;
      text-decoration: none;
      color: white;
    }
    .navbar__logo span { color: #a89cf9; }
    .btn-full { width: 100%; justify-content: center; }
    .auth-switch { text-align: center; margin-top: 24px; font-size: 0.85rem; color: #9b9aaa; }
    .auth-switch a { color: #a89cf9; cursor: pointer; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #1a1a1e; border-left: 3px solid var(--green); padding: 12px 20px; border-radius: 8px; display: none; }
    .toast.show { display: block; }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <a href="../index.html" class="navbar__logo">Sound<span>log</span></a>
      <h1 id="auth-title">Iniciar sesión</h1>
      
      <div id="login-form">
        <div class="form-group">
          <label>Usuario</label>
          <input type="text" id="login-username" placeholder="usuario" autocomplete="off">
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="off">
        </div>
        <button class="btn btn--primary btn-full" onclick="handleLogin()">
          <i class="ti ti-login"></i> Iniciar sesión
        </button>
      </div>
      
      <div id="register-form" style="display: none;">
        <div class="form-group">
          <label>Usuario *</label>
          <input type="text" id="register-username" placeholder="mi_usuario" autocomplete="off">
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="register-email" placeholder="usuario@ejemplo.com" autocomplete="off">
        </div>
        <div class="form-group">
          <label>Contraseña *</label>
          <input type="password" id="register-password" placeholder="••••••••" autocomplete="off">
        </div>
        <div class="form-group">
          <label>Confirmar contraseña</label>
          <input type="password" id="register-confirm" placeholder="••••••••" autocomplete="off">
        </div>
        <button class="btn btn--primary btn-full" onclick="handleRegister()">
          <i class="ti ti-user-plus"></i> Registrarse
        </button>
      </div>
      
      <div class="auth-switch">
        <span id="switch-text">¿No tienes cuenta? <a onclick="toggleAuthMode()">Regístrate</a></span>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const SUPABASE_URL = 'https://omwdajgpywdwrbiguvfl.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_e4HpONc7gleaNaxEG6FTUQ_5t4JbdLa';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let isLoginMode = true;

    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.style.borderLeftColor = type === 'success' ? '#1db954' : '#e74c3c';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function toggleAuthMode() {
      isLoginMode = !isLoginMode;
      document.getElementById('login-form').style.display = isLoginMode ? 'block' : 'none';
      document.getElementById('register-form').style.display = isLoginMode ? 'none' : 'block';
      document.getElementById('auth-title').textContent = isLoginMode ? 'Iniciar sesión' : 'Registrarse';
      document.getElementById('switch-text').innerHTML = isLoginMode 
        ? '¿No tienes cuenta? <a onclick="toggleAuthMode()">Regístrate</a>'
        : '¿Ya tienes cuenta? <a onclick="toggleAuthMode()">Inicia sesión</a>';
    }

    async function handleLogin() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      
      if (!username || !password) {
        showToast('Completa todos los campos', 'error');
        return;
      }
      
      const { data, error } = await supabase
        .from('users')
        .select('*')
        .eq('username', username)
        .eq('password', password)
        .single();
      
      if (error || !data) {
        showToast('Usuario o contraseña incorrectos', 'error');
      } else {
        delete data.password;
        localStorage.setItem('soundlog_current_user', JSON.stringify(data));
        showToast('¡Bienvenido!', 'success');
        setTimeout(() => { window.location.href = '../index.html'; }, 1000);
      }
    }

    async function handleRegister() {
      const username = document.getElementById('register-username').value.trim();
      const email = document.getElementById('register-email').value.trim();
      const password = document.getElementById('register-password').value;
      const confirm = document.getElementById('register-confirm').value;
      
      if (!username || !email || !password) {
        showToast('Completa todos los campos', 'error');
        return;
      }
      if (password !== confirm) {
        showToast('Las contraseñas no coinciden', 'error');
        return;
      }
      if (password.length < 4) {
        showToast('La contraseña debe tener al menos 4 caracteres', 'error');
        return;
      }
      
      // Verificar si el usuario ya existe
      const { data: existing } = await supabase
        .from('users')
        .select('username')
        .eq('username', username)
        .single();
      
      if (existing) {
        showToast('Ese usuario ya existe', 'error');
        return;
      }
      
      const { data, error } = await supabase
        .from('users')
        .insert([{
          username: username,
          email: email,
          password: password,
          display_name: username,
          avatar: username.substring(0, 2).toUpperCase(),
          avatar_color: 'purple'
        }])
        .select();
      
      if (error) {
        showToast('Error: ' + error.message, 'error');
      } else if (data && data[0]) {
        delete data[0].password;
        localStorage.setItem('soundlog_current_user', JSON.stringify(data[0]));
        showToast('¡Cuenta creada!', 'success');
        setTimeout(() => { window.location.href = '../index.html'; }, 1000);
      }
    }
  </script>
</body>
</html>
