<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login Soundlog</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #0d0d0f; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: #1a1a1e; padding: 30px; border-radius: 12px; width: 300px; }
    input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #7c6af7; border: none; color: white; cursor: pointer; border-radius: 5px; }
  </style>
</head>
<body>
<div class="card">
  <h2 id="title">Iniciar Sesión</h2>
  <input type="text" id="username" placeholder="Usuario">
  <input type="password" id="password" placeholder="Contraseña">
  <button id="btnAction">Entrar</button>
  <p id="msg" style="text-align:center; font-size:12px;"></p>
</div>

<script>
  const supabase = window.supabase.createClient('https://omwdajgpywdwrbiguvfl.supabase.co', 'sb_publishable_e4HpONc7gleaNaxEG6FTUQ_5t4JbdLa');
  const btn = document.getElementById('btnAction');

  btn.onclick = async () => {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const msg = document.getElementById('msg');

    // INTENTAR LOGUEAR
    const { data, error } = await supabase.from('users').select('*').eq('username', user).eq('password', pass).maybeSingle();
    
    if (data) {
      localStorage.setItem('soundlog_current_user', JSON.stringify(data));
      window.location.href = '/albumbyalbum/index.html';
    } else {
      // SI NO EXISTE, INTENTAR REGISTRAR
      const { error: regErr } = await supabase.from('users').insert([{ username: user, password: pass }]);
      if (!regErr) {
        msg.textContent = "Usuario creado. Haz clic en Entrar otra vez.";
      } else {
        msg.textContent = "Error: " + (error?.message || "Usuario no encontrado");
      }
    }
  };
</script>
</body>
</html>
