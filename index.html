<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soundlog — Feed</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__logo display">Sound<span>log</span></a>
      <nav class="navbar__nav">
        <a href="index.html" class="navbar__link active">Feed</a>
        <a href="pages/explorar.html" class="navbar__link">Explorar</a>
        <a href="pages/foros.html" class="navbar__link">Foros</a>
        <a href="pages/stats.html" class="navbar__link">Stats</a>
      </nav>
      <div class="navbar__right">
        <a href="pages/perfil.html" class="avatar avatar--md avatar--purple user-avatar">U</a>
        <button class="btn--ghost btn" onclick="logout()"><i class="ti ti-logout"></i></button>
      </div>
    </div>
  </div>
</nav>

<main class="container">
  <div class="page-grid">
    <aside>
      <div class="card mb-16">
        <div class="flex items-center gap-10 mb-12">
          <div class="avatar avatar--lg avatar--purple user-avatar">U</div>
          <div>
            <div class="text-sm font-medium username-display">Cargando...</div>
            <div class="text-sm text-muted"><span class="album-count">0</span> álbumes</div>
          </div>
        </div>
        <button class="btn btn--primary btn--sm w-100" onclick="openAddAlbumModal()" style="width:100%">+ Agregar álbum</button>
      </div>
    </aside>

    <section>
      <div class="card" id="feed-container">
        <div class="empty-state">Cargando feed...</div>
      </div>
    </section>

    <aside>
      <div class="card">
        <div class="section-label">Tu progreso</div>
        <div class="text-center p-12">
          <div style="font-size:36px" class="album-count">0</div>
          <div class="text-sm text-muted">álbumes</div>
        </div>
      </div>
    </aside>
  </div>
</main>

<div id="addAlbumModal" class="modal">
  <div class="modal__content">
    <div class="modal__header"><h3>Agregar álbum</h3><span class="modal__close" onclick="closeModal('addAlbumModal')">&times;</span></div>
    <div class="modal__body">
      <input type="text" id="albumTitle" placeholder="Álbum"><br><br>
      <input type="text" id="albumArtist" placeholder="Artista"><br><br>
      <select id="albumRating"><option value="5">5 estrellas</option><option value="4">4 estrellas</option><option value="3">3 estrellas</option><option value="2">2 estrellas</option><option value="1">1 estrella</option></select><br><br>
      <textarea id="albumReview" placeholder="Tu reseña..."></textarea>
    </div>
    <div class="modal__footer"><button class="btn btn--secondary" onclick="closeModal('addAlbumModal')">Cancelar</button><button class="btn btn--primary" onclick="submitAlbum()">Guardar</button></div>
  </div>
</div>

<div class="toast"></div>

<script src="js/main.js"></script>
</body>
</html>
